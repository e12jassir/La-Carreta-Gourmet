schema: spec-driven

context: |
  Tech stack: HTML + CSS + vanilla JavaScript (no framework, no bundler, no package manager)
  Architecture: static single-page site, inline and linked CSS/JS
  Testing: no test runner configured; E2E via Playwright available as external tool
  Style: Spanish-language content, gourmet restaurant branding, responsive design
  Language: es (content), English (code artifacts)

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
